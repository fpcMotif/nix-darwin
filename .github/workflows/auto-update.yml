name: auto-update

# Daily combined-PR strategy. Each scripts/update-*.sh runs in turn; failures
# are tolerated PER-SCRIPT so a broken upstream parser doesn't block the rest.
# After the loop, two HARD GUARDS run:
#   1. au_assert_clean — fails if any FAKE placeholder hash or stray *.bak
#      artifact survived. Prevents broken state from ever reaching a PR.
#   2. focused Linux checks — fails if the lockfile diverged from the vendored
#      derivations or the Linux-scoped config/tests stop evaluating.
#
# The PR auto-merges once build.yml's required checks turn green.
#
# Cadence rationale: an hourly cron was too aggressive — it re-ran the full
# build.yml CI matrix (Linux + macOS) on every bump, up to ~24x/day, for what
# is usually a one-line lockfile churn. A single daily run keeps upstream drift
# bounded to ~24h while collapsing all updaters into one nightly-style PR via
# the `branch: auto-update/nightly` reuse below. Trigger `workflow_dispatch`
# manually when a same-day bump is needed.

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: auto-update
  cancel-in-progress: false

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          # PAT (not GITHUB_TOKEN) so the resulting PR triggers build.yml.
          token: ${{ secrets.AUTO_UPDATE_PAT }}
          fetch-depth: 0

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
            substituters = https://claude-code.cachix.org https://cache.nixos.org
            trusted-public-keys = claude-code.cachix.org-1:YeXf2aNu7UTX8Vwrze0za1WEDS+4DuI2kVeWEE4fsRk= cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY=

      - name: Run updaters (each tolerated to fail)
        # Authenticate the updaters' GitHub API polling (au_latest_github_release)
        # so the 60/hr unauthenticated limit can't 403 a shared-runner IP and
        # silently skip a bump.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          shopt -s nullglob
          fail_count=0
          for s in scripts/update-*.sh; do
            echo "::group::$s"
            if ! bash "$s"; then
              fail_count=$((fail_count + 1))
              echo "::warning::$s failed; continuing"
            fi
            echo "::endgroup::"
          done
          echo "::notice::$fail_count updater(s) failed (tolerated)"

      - name: Clean stray sed/sed-bak artifacts (defence-in-depth)
        run: |
          # `.gitignore` already excludes these, but failed runs of the OLD
          # `sed -i.bak` pattern can still leave them in the working tree.
          find pkgs -type f \( -name '*.bak' -o -name '*.bak[0-9]*' \) -print -delete \
            2>/dev/null || true

      - name: Guard — no FAKE hashes, no .bak files
        run: bash scripts/lib/auto-update.sh assert-clean

      - name: Guard — Linux checks still build
        run: |
          # `nix flake check --no-build` cannot handle the agent-skills
          # import-from-derivation bundle path. Build the native Linux check
          # slice instead; build.yml still validates the full Linux + macOS
          # matrix on the generated PR.
          nix build --no-link --show-trace --print-build-logs \
            '.#checks.x86_64-linux.unit-overlay' \
            '.#checks.x86_64-linux.integration-configurations-eval'

      - name: Open or update PR
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.AUTO_UPDATE_PAT }}
          branch: auto-update/nightly
          title: "auto-update: nightly bump"
          commit-message: "chore: nightly auto-update"
          body: |
            Auto-generated by `.github/workflows/auto-update.yml`.

            Bumps any of:
            - all flake inputs via `scripts/update-flake-inputs.sh`
              (nixpkgs → codex / node toolchain, darwin,
              home-manager, agent-skills, claude-code, NUR/crush, dotfiles, …)
            - vendored derivations under `pkgs/`: codex (prerelease channel),
              bun-canary-bin, sourcegraph-amp (amp), opencode (cli + electron),
              pi-coding-agent, oh-my-pi, google-drive, zed-nightly-bin.

            Each updater is allowed to fail individually; partial bumps still
            land in this PR. Two hard guards prevent broken state from being
            committed:
              1. `au_assert_clean` (no FAKE hashes / .bak artifacts)
              2. focused Linux `nix build --no-link` checks

            Auto-merges on green CI. See `PANIC.md` for rollback.
          labels: auto-update
          delete-branch: true

      - name: Enable auto-merge
        if: steps.cpr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.AUTO_UPDATE_PAT }}
        run: |
          gh pr merge --auto --squash \
            "${{ steps.cpr.outputs.pull-request-number }}"
