name: auto-update

# Daily combined-PR strategy. Each scripts/update-*.sh runs in turn; failures
# are tolerated so a broken upstream parser does not block the rest. The PR
# auto-merges once build.yml's required checks turn green.

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: auto-update
  cancel-in-progress: false

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # PAT (not GITHUB_TOKEN) so the resulting PR triggers build.yml.
          token: ${{ secrets.AUTO_UPDATE_PAT }}
          fetch-depth: 0

      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
            substituters = https://claude-code.cachix.org https://cache.nixos.org
            trusted-public-keys = claude-code.cachix.org-1:YeXf2aNu7UTX8Vwrze0za1WEDS+4DuI2kVeWEE4fsRk= cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY=

      - name: Run updaters (each tolerated to fail)
        run: |
          shopt -s nullglob
          for s in scripts/update-*.sh; do
            echo "::group::$s"
            bash "$s" || echo "::warning::$s failed; continuing"
            echo "::endgroup::"
          done

      - name: Open or update PR
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.AUTO_UPDATE_PAT }}
          branch: auto-update/nightly
          title: "auto-update: nightly bump"
          commit-message: "chore: nightly auto-update"
          body: |
            Auto-generated by `.github/workflows/auto-update.yml`.

            Bumps any of: claude-code-nix, crush, gemini-cli-preview,
            sourcegraph-amp, pi-coding-agent, oh-my-pi, starship-claude, droid.
            Each updater is allowed to fail individually; partial bumps still
            land in this PR.

            Auto-merges on green CI. See `PANIC.md` for rollback.
          labels: auto-update
          delete-branch: true

      - name: Enable auto-merge
        if: steps.cpr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.AUTO_UPDATE_PAT }}
        run: |
          gh pr merge --auto --squash \
            "${{ steps.cpr.outputs.pull-request-number }}"
