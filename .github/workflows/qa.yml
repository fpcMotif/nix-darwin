# Diff-aware functional QA for nix-config.
#
# This workflow runs in addition to .github/workflows/build.yml.
# build.yml is exhaustive (full nix flake check + every host build, on real
# macos-14 / ubuntu-latest / ubuntu-24.04-arm runners) and remains the
# primary required check.
# qa.yml is focused: a single ubuntu-latest runner invokes the `qa` skill,
# which inspects `git diff`, runs only the Nix flows relevant to the change,
# and posts a concise PR comment. Cross-platform / darwin-only flows are
# reported as INCONCLUSIVE here and rely on build.yml for actual coverage.

name: qa

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: qa-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  qa:
    name: qa (diff-aware, ubuntu-latest)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout (full history for diff)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
            substituters = https://claude-code.cachix.org https://cache.nixos.org
            trusted-public-keys = claude-code.cachix.org-1:YeXf2aNu7UTX8Vwrze0za1WEDS+4DuI2kVeWEE4fsRk= cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY=

      - name: Prepare results dir
        run: |
          RUN_ID="${{ github.run_id }}"
          mkdir -p "qa-results/$RUN_ID"
          echo "RUN_ID=$RUN_ID" >> "$GITHUB_ENV"
          echo "QA_RESULTS_DIR=qa-results/$RUN_ID" >> "$GITHUB_ENV"

      - name: Resolve diff base
        id: diff
        run: |
          BASE="origin/${{ github.event.pull_request.base.ref || 'main' }}"
          git fetch origin "${{ github.event.pull_request.base.ref || 'main' }}" --depth=50 || true
          MERGE_BASE=$(git merge-base HEAD "$BASE" 2>/dev/null || git rev-parse HEAD~1)
          echo "merge_base=$MERGE_BASE" >> "$GITHUB_OUTPUT"
          echo "Diff base: $MERGE_BASE"
          git diff --name-only "$MERGE_BASE"...HEAD | tee "$QA_RESULTS_DIR/changed-files.txt"

      - name: Install droid CLI
        run: |
          curl -fsSL https://app.factory.ai/cli | sh
          # The installer typically drops the binary in $HOME/.factory/bin or similar.
          # Make sure it's on PATH for the next step.
          if [ -d "$HOME/.factory/bin" ]; then echo "$HOME/.factory/bin" >> "$GITHUB_PATH"; fi
          if [ -d "$HOME/.local/bin" ]; then echo "$HOME/.local/bin" >> "$GITHUB_PATH"; fi
          # Sanity: print version once PATH is set in the next step.

      - name: Verify droid CLI
        run: |
          which droid || (echo "droid CLI not on PATH" && exit 1)
          droid --version || true

      - name: Run qa skill (diff-aware)
        id: qa
        continue-on-error: true
        timeout-minutes: 20
        env:
          CI: 'true'
          QA_RUN_ID: ${{ env.RUN_ID }}
          QA_DIFF_BASE: ${{ steps.diff.outputs.merge_base }}
        run: |
          set -o pipefail
          droid exec --auto high "$(cat <<'EOF'
          You are running in a non-interactive CI environment. There is NO
          human available. Do NOT use AskUser, do NOT wait for confirmations,
          do NOT pause for input.

          Run the `qa` skill at .factory/skills/qa/SKILL.md.

          - Diff base: $QA_DIFF_BASE (use `git diff --name-only $QA_DIFF_BASE...HEAD`).
          - Runner platform: x86_64-linux. Mark darwin / aarch64 flows as
            INCONCLUSIVE with a pointer to .github/workflows/build.yml.
          - Write the final report to qa-results/$QA_RUN_ID/report.md AND
            also copy it to qa-results/report.md (top-level path the
            comment-posting step reads).
          - Save per-flow logs under qa-results/$QA_RUN_ID/.
          - Failure-learning mode: suggest_in_report. Do NOT write
            qa-results/skill-updates.json.
          EOF
          )" 2>&1 | tee "$QA_RESULTS_DIR/droid-exec.log"

      - name: Ensure report exists
        if: always()
        run: |
          if [ ! -s qa-results/report.md ] && [ -s "$QA_RESULTS_DIR/report.md" ]; then
            cp "$QA_RESULTS_DIR/report.md" qa-results/report.md
          fi
          if [ ! -s qa-results/report.md ]; then
            {
              echo "## QA Report"
              echo
              echo "_The qa skill did not produce a report. See the workflow log for details._"
              echo
              echo "<details><summary>droid exec output (tail)</summary>"
              echo
              echo '```'
              tail -200 "$QA_RESULTS_DIR/droid-exec.log" 2>/dev/null || echo "no log captured"
              echo '```'
              echo
              echo "</details>"
            } > qa-results/report.md
          fi

      - name: Cleanup (rm result symlinks + store gc)
        if: always()
        run: |
          rm -f result result-* || true
          nix store gc --max 1G || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-results-${{ github.run_id }}
          path: qa-results/
          retention-days: 14

      - name: Post / update PR comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- qa-report -->';
            let body = marker + '\n';
            try {
              body += fs.readFileSync('qa-results/report.md', 'utf8');
            } catch (e) {
              body += '## QA Report\n\n_(report file missing)_\n';
            }
            body += `\n\n---\n_Run: [${context.runId}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) · Artifacts: \`qa-results-${context.runId}\`_\n`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              per_page: 100,
            });
            const existing = comments.find(c => c.body && c.body.startsWith(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body,
              });
            }

      - name: Surface skill exit status
        if: always()
        run: |
          # The qa skill reports per-flow PASS/FAIL/BLOCKED in the report. We
          # do NOT fail the workflow on individual flow failures (build.yml
          # already gates merges). qa.yml is informational; only fail if the
          # skill itself crashed.
          if [ "${{ steps.qa.outcome }}" = "failure" ] && [ ! -s qa-results/report.md ]; then
            echo "qa skill crashed and produced no report"
            exit 1
          fi
