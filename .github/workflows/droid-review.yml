name: Droid Auto Review

# Runs Factory AI's automatic PR review on every non-draft PR. If
# `FACTORY_API_KEY` is unset (e.g. in a fork or before the secret has been
# provisioned), the job no-ops with a `success` status so it never blocks
# auto-merge on the auto-update PRs.

on:
  pull_request:
    types: [opened, ready_for_review, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  droid-review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Check FACTORY_API_KEY availability
        id: gate
        env:
          HAS_KEY: ${{ secrets.FACTORY_API_KEY != '' }}
        run: |
          if [ "$HAS_KEY" = "true" ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::FACTORY_API_KEY not configured — skipping droid review."
            echo "ok=false" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.gate.outputs.ok == 'true'
        name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1
      - if: steps.gate.outputs.ok == 'true'
        name: Run Droid Auto Review
        uses: Factory-AI/droid-action@main
        with:
          factory_api_key: ${{ secrets.FACTORY_API_KEY }}
          automatic_review: true
          automatic_security_review: true
