name: Droid Tag

# Runs Factory AI on `@droid` mentions in issues, PRs, and review comments.
# Skips cleanly when `FACTORY_API_KEY` is unset so it never blocks PRs.

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]
  pull_request:
    types: [opened, edited]

jobs:
  droid:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@droid')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@droid')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@droid')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@droid') || contains(github.event.issue.title, '@droid'))) ||
      (github.event_name == 'pull_request' && (contains(github.event.pull_request.body, '@droid') || contains(github.event.pull_request.title, '@droid')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Check FACTORY_API_KEY availability
        id: gate
        env:
          HAS_KEY: ${{ secrets.FACTORY_API_KEY != '' }}
        run: |
          if [ "$HAS_KEY" = "true" ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::FACTORY_API_KEY not configured — skipping @droid handler."
            echo "ok=false" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.gate.outputs.ok == 'true'
        name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1
      - if: steps.gate.outputs.ok == 'true'
        name: Run Droid Exec
        uses: Factory-AI/droid-action@main
        with:
          factory_api_key: ${{ secrets.FACTORY_API_KEY }}
