# Build the CI-covered flake configurations on real macOS / Linux runners.
#
# `fpcMotif/dotfiles` is public, so the `dotfiles` flake input uses the
# `github:` URL form and the workflow needs no SSH key. If the dotfiles repo
# is ever made private, switch the input back to `git+ssh://...` and add a
# `webfactory/ssh-agent` step that consumes a Deploy Key stored as the
# `DOTFILES_DEPLOY_KEY` Actions secret.

name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  flake-check:
    name: nix flake check (x86_64-linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      - name: Run nix flake check
        run: |
          nix build --no-link --show-trace --print-build-logs \
            '.#checks.x86_64-linux.smoke' \
            '.#checks.x86_64-linux.unit-mksystem' \
            '.#checks.x86_64-linux.unit-overlay' \
            '.#checks.x86_64-linux.unit-format' \
            '.#checks.x86_64-linux.integration-configurations-eval' \
            '.#checks.x86_64-linux.integration-darwin-settings' \
            '.#checks.x86_64-linux.smoke-build-common' \
            '.#checks.x86_64-linux.smoke-build-oh-my-pi' \
            '.#checks.x86_64-linux.smoke-build-toolchain'

  darwin:
    name: f (aarch64-darwin)
    runs-on: macos-14
    needs: flake-check
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      - name: Run nix flake check (aarch64-darwin)
        run: |
          nix build --no-link --show-trace --print-build-logs \
            '.#checks.aarch64-darwin.smoke' \
            '.#checks.aarch64-darwin.unit-mksystem' \
            '.#checks.aarch64-darwin.unit-overlay' \
            '.#checks.aarch64-darwin.unit-format' \
            '.#checks.aarch64-darwin.integration-configurations-eval' \
            '.#checks.aarch64-darwin.integration-darwin-settings' \
            '.#checks.aarch64-darwin.smoke-build-common' \
            '.#checks.aarch64-darwin.smoke-build-oh-my-pi' \
            '.#checks.aarch64-darwin.smoke-build-toolchain'

      - name: Build darwinConfigurations.f
        run: |
          nix build \
            .#darwinConfigurations.f.system \
            --no-link --print-out-paths --show-trace

  nixos:
    name: ${{ matrix.config }} (x86_64-linux)
    runs-on: ubuntu-latest
    needs: flake-check
    strategy:
      fail-fast: false
      matrix:
        config: [wsl, x230]
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      - name: Build nixosConfigurations.${{ matrix.config }}
        run: |
          nix build \
            .#nixosConfigurations.${{ matrix.config }}.config.system.build.toplevel \
            --no-link --print-out-paths --show-trace

  nixos-aarch64:
    name: vm-aarch64-utm (aarch64-linux)
    runs-on: ubuntu-24.04-arm
    needs: flake-check
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      - name: Build nixosConfigurations.vm-aarch64-utm
        run: |
          nix build \
            .#nixosConfigurations.vm-aarch64-utm.config.system.build.toplevel \
            --no-link --print-out-paths --show-trace
