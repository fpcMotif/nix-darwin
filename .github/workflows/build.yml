# Build the three flake configurations on real macOS / Linux runners.
#
# The `dotfiles` flake input is fetched over HTTPS from a public GitHub repo,
# so CI does not need any deploy keys or secrets. If you ever flip
# `fpcMotif/dotfiles` back to private, switch the input in `flake.nix` to
# `git+ssh://git@github.com/fpcMotif/dotfiles.git?ref=main`, configure a
# read-only deploy key as a `DOTFILES_DEPLOY_KEY` Actions secret, and re-add
# the `webfactory/ssh-agent` + `ssh-keyscan` steps to each job below.

name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  darwin:
    name: Martins-Mac-mini (aarch64-darwin)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      - name: Build darwinConfigurations.Martins-Mac-mini
        run: |
          nix build \
            .#darwinConfigurations.Martins-Mac-mini.system \
            --no-link --print-out-paths --show-trace

  nixos:
    name: ${{ matrix.config }} (x86_64-linux)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        config: [wsl, x230]
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      - name: Build nixosConfigurations.${{ matrix.config }}
        run: |
          nix build \
            .#nixosConfigurations.${{ matrix.config }}.config.system.build.toplevel \
            --no-link --print-out-paths --show-trace
