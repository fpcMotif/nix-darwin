# Build the three flake configurations on real macOS / Linux runners.
#
# `fpcMotif/dotfiles` is public, so the `dotfiles` flake input uses the
# `github:` URL form and the workflow needs no SSH key. If the dotfiles repo
# is ever made private, switch the input back to `git+ssh://...` and add a
# `webfactory/ssh-agent` step that consumes a Deploy Key stored as the
# `DOTFILES_DEPLOY_KEY` Actions secret.

name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

# Cancel an older in-flight CI run when a new commit is pushed to the same PR.
# Pushes to `main` always finish so we never lose a clean signal there.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  darwin:
    name: Martins-Mac-mini (aarch64-darwin)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      - uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Build darwinConfigurations.Martins-Mac-mini
        run: |
          nix build \
            .#darwinConfigurations.Martins-Mac-mini.system \
            --no-link --print-out-paths --show-trace

  nixos:
    name: ${{ matrix.config }} (x86_64-linux)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        config: [wsl, x230]
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      - uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Build nixosConfigurations.${{ matrix.config }}
        run: |
          nix build \
            .#nixosConfigurations.${{ matrix.config }}.config.system.build.toplevel \
            --no-link --print-out-paths --show-trace

  flake-check:
    name: flake check (fmt + statix + deadnix + eval)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      - uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: nix flake check
        run: nix flake check --print-build-logs --show-trace
