# Build the three flake configurations on real macOS / Linux runners.
#
# One-time setup before this workflow can succeed:
#
#   1. Generate a CI-only SSH key pair (no passphrase):
#        ssh-keygen -t ed25519 -f dotfiles-ci -N ""
#
#   2. Add the PUBLIC key (`dotfiles-ci.pub`) to the dotfiles repo
#      (fpcMotif/dotfiles) as a Deploy Key with READ-ONLY access:
#        Settings -> Deploy keys -> Add deploy key
#
#   3. Add the PRIVATE key (`dotfiles-ci`) to THIS repo
#      (fpcMotif/nix-darwin) as an Actions secret named
#      `DOTFILES_DEPLOY_KEY`:
#        Settings -> Secrets and variables -> Actions -> New repository secret
#
#   4. Delete `dotfiles-ci` and `dotfiles-ci.pub` from your laptop.
#
# If the dotfiles repo is public, you can replace the SSH steps with
# `flake.nix` switching the `dotfiles` input to a `github:` URL and drop
# `webfactory/ssh-agent` from each job.

name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  darwin:
    name: Martins-Mac-mini (aarch64-darwin)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DOTFILES_DEPLOY_KEY }}

      - name: Trust github.com host key
        run: ssh-keyscan github.com >> ~/.ssh/known_hosts

      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      - name: Build darwinConfigurations.Martins-Mac-mini
        run: |
          nix build \
            .#darwinConfigurations.Martins-Mac-mini.system \
            --no-link --print-out-paths --show-trace

  nixos:
    name: ${{ matrix.config }} (x86_64-linux)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        config: [wsl, x230]
    steps:
      - uses: actions/checkout@v4

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DOTFILES_DEPLOY_KEY }}

      - name: Trust github.com host key
        run: ssh-keyscan github.com >> ~/.ssh/known_hosts

      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      - name: Build nixosConfigurations.${{ matrix.config }}
        run: |
          nix build \
            .#nixosConfigurations.${{ matrix.config }}.config.system.build.toplevel \
            --no-link --print-out-paths --show-trace
