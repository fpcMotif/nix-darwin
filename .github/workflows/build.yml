# Build the CI-covered flake configurations on real macOS / Linux runners.
#
# `fpcMotif/dotfiles` is public, so the `dotfiles` flake input uses the
# `github:` URL form and the workflow needs no SSH key. If the dotfiles repo
# is ever made private, switch the input back to `git+ssh://...` and add a
# `webfactory/ssh-agent` step that consumes a Deploy Key stored as the
# `DOTFILES_DEPLOY_KEY` Actions secret.

name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  flake-check:
    name: nix flake check (x86_64-linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      - name: Run nix flake check
        # The `ci-gate` check group (single source of truth: `tests/default.nix`,
        # exposed as the `checkGroups` flake output) is resolved to attrpaths
        # here rather than hardcoded — see `scripts/lib/check-group.sh`. Attr
        # names never contain whitespace/globs, so the unquoted `$()` below is
        # safe word-splitting, not a quoting bug.
        run: |
          nix build --no-link --show-trace --print-build-logs \
            $(bash scripts/lib/check-group.sh x86_64-linux ci-gate)

      - name: Build dev shell and dev container (x86_64-linux)
        run: |
          nix build --no-link --show-trace \
            '.#devShells.x86_64-linux.default' \
            '.#packages.x86_64-linux.dev-container'

  darwin:
    name: f (aarch64-darwin)
    runs-on: macos-14
    needs: flake-check
    steps:
      - uses: actions/checkout@v5

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      - name: Run nix flake check (aarch64-darwin)
        # Same `ci-gate` group as the x86_64-linux job above, resolved for
        # this system — see `scripts/lib/check-group.sh`.
        run: |
          nix build --no-link --show-trace --print-build-logs \
            $(bash scripts/lib/check-group.sh aarch64-darwin ci-gate)

      - name: Build dev shell (aarch64-darwin)
        run: |
          nix build --no-link --show-trace \
            '.#devShells.aarch64-darwin.default'

      - name: Build darwinConfigurations.f
        run: |
          nix build \
            .#darwinConfigurations.f.system \
            --no-link --print-out-paths --show-trace

  nixos:
    name: ${{ matrix.config }} (x86_64-linux)
    runs-on: ubuntu-latest
    needs: flake-check
    strategy:
      fail-fast: false
      matrix:
        config: [wsl, x230]
    steps:
      - uses: actions/checkout@v5

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      - name: Build nixosConfigurations.${{ matrix.config }}
        run: |
          nix build \
            .#nixosConfigurations.${{ matrix.config }}.config.system.build.toplevel \
            --no-link --print-out-paths --show-trace

  nixos-aarch64:
    name: vm-aarch64-utm (aarch64-linux)
    runs-on: ubuntu-24.04-arm
    needs: flake-check
    steps:
      - uses: actions/checkout@v5

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      - name: Build nixosConfigurations.vm-aarch64-utm
        run: |
          nix build \
            .#nixosConfigurations.vm-aarch64-utm.config.system.build.toplevel \
            --no-link --print-out-paths --show-trace

      - name: Build dev container (aarch64-linux)
        run: |
          nix build --no-link --show-trace \
            '.#packages.aarch64-linux.dev-container'
